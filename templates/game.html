<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Butterfly Effect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/game.css') }}">
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="hud">
  <div id="loop-counter">LOOP 1 / 5</div>
  <div id="timer"></div>
  <div id="crosshair"></div>
  <div id="interact-prompt"></div>
  <div id="hint"></div>
  <div id="minimap"></div>
  <div id="controls-hint">
    WASD — move<br>
    Mouse — look<br>
    E — interact<br>
    Click to lock mouse
  </div>
</div>

<div id="overlay">
  <p style="color:rgba(255,255,255,0.4);font-size:14px;">Loading...</p>
</div>

<script>
  window.addEventListener('error', function(e) {
    var o = document.getElementById('overlay');
    o.style.display = 'flex';
    o.innerHTML = '<h1 style="color:#ff4444">Error</h1>' +
      '<p style="font-size:13px;max-width:80%;word-break:break-all;text-align:center">' +
      (e.message || 'Unknown error') + '<br><small style="opacity:0.5">' +
      (e.filename ? e.filename.split('/').pop() : '') + ':' + e.lineno + '</small></p>';
  });
</script>

<!-- Three.js must fully load before game.js runs -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"
        onerror="this.onerror=null;this.src='https://unpkg.com/three@0.160.0/build/three.min.js'">
</script>
<script src="{{ url_for('static', filename='js/game.js') }}"></script>

</body>
</html>
