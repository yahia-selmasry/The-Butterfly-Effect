services:
  - type: web
    name: the-butterfly-effect
    runtime: python
    buildCommand: pip install flask flask-login werkzeug psycopg2-binary gunicorn
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
